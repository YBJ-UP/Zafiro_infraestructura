
services:
  postgres:
    image: postgres:16-alpine
    container_name: bd_zafiro
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER_ADMIN:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_ADMIN:-postgres}
      POSTGRES_DB: ${POSTGRES_DB_NAME:-zafiro}
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      
volumes:
  postgres_data:
