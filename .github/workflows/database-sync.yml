name: Deploy Database Schema

on:
  push:
    branches:
      - main # O el nombre de tu rama principal
    paths:
      - 'db/**' # Solo se dispara si hay cambios en la carpeta 'db'
  workflow_dispatch: # Permite ejecutar manualmente el workflow

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link a Supabase Project
        run: supabase link --project-ref ${{ secrets.PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Changes
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}